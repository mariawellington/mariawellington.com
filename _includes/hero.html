<section class="banner">
  <div class="content">
    <h1>{{ site.data.profile.name }}</h1>
    <p class="major">{{ site.data.profile.tagline }}</p>
    <p>
      Class of {{ site.data.profile.class_year }} · Interested in
      {{ site.data.profile.intended_majors | join: ", " }}
    </p>
    <ul class="actions">
      <li><a class="button primary" href="#contact">Get in touch</a></li>
      <li><a class="button" href="#highlights">View highlights</a></li>
    </ul>
  </div>
  <div class="image">
    <img
      src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=2200&q=80"
      alt="Northern wilderness lake with trees"
    />
  </div>
</section>

<section id="extracurriculars" class="wrapper alt">
  <div class="inner">
    <h2>Activities & Leadership</h2>
    <div class="items">
      {% for activity in site.data.extracurriculars %}
        <article class="item">
          <h3>{{ activity.role }} · {{ activity.organization }}</h3>
          <p class="card-meta">{{ activity.period }}</p>
          <p>{{ activity.impact }}</p>
        </article>
      {% endfor %}
    </div>
  </div>
</section>

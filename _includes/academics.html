<section id="academics" class="section section-alt">
  <div class="container">
    <h2>Academic Focus</h2>
    <div class="grid">
      {% for item in site.data.academics %}
        <div class="card-shell">
          <article class="card">
            <h3>{{ item.title }}</h3>
            <p class="card-meta">{{ item.period }}</p>
            <p>{{ item.description }}</p>
          </article>
        </div>
      {% endfor %}
    </div>
  </div>
</section>

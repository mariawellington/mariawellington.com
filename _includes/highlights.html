<section id="highlights" class="wrapper alt">
  <div class="inner">
    <h2>Highlights</h2>
    <div class="items">
      {% for highlight in site.data.highlights %}
        <article class="item">
          <h3>{{ highlight.title }}</h3>
          <p>{{ highlight.description }}</p>
        </article>
      {% endfor %}
    </div>
  </div>
</section>

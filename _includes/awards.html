<section id="awards" class="section">
  <div class="container">
    <h2>Honors & Milestones</h2>
    <ul class="timeline">
      {% for award in site.data.awards %}
        <li>
          <div class="card-shell card-shell--honors">
            <article class="card">
              <strong>{{ award.year }} - {{ award.title }}</strong>
              <span>{{ award.issuer }}</span>
              <p>{{ award.context }}</p>
            </article>
          </div>
        </li>
      {% endfor %}
    </ul>
  </div>
</section>

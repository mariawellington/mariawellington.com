tagline: Seattle-based student into performing arts, outdoor adventure, and community impact.
bio: >
  I am a student at Chief Sealth International High School in Seattle, and I am preparing for
  the IB Diploma Programme.
  I love performing arts, creative projects, and community service, and I spend a lot of my time
  working on things that are both meaningful and fun.
  I have also spent the last several summers at Camp Wabun in Temagami, Ontario, where wilderness
  canoe tripping taught me resilience, teamwork, and leadership.
  This site is a snapshot of what I am learning, creating, and contributing as I prepare for
  college.
